<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Society POS — Login</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="apple-touch-icon" href="assets/icon-192.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="animated-bg"></div>

  <!-- Login Page -->
  <main class="login-page">
    <div class="login-container">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-logo">
          <!-- POS / Shop Icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
        </div>
        <h1>Society POS</h1>
        <p>Inventory &amp; Sales Management</p>
      </div>

      <!-- Login Card -->
      <div class="login-card glass-card">
        <!-- Error Message -->
        <div id="login-error" class="login-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span>Invalid email or password</span>
        </div>

        <!-- Login Form -->
        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <label for="login-email" class="form-label">Email Address</label>
            <input
              type="email"
              id="login-email"
              class="form-input"
              placeholder="you@example.com"
              required
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label for="login-password" class="form-label">Password</label>
            <input
              type="password"
              id="login-password"
              class="form-input"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
          </div>

          <div class="login-btn-wrapper">
            <button type="submit" id="login-btn" class="btn btn-primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              Sign In
            </button>
          </div>
        </form>

        <!-- Guest Link -->
        <div class="login-footer">
          <p>Just browsing? <a href="guest.html" id="guest-link">View as Guest</a></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[SW] Registered'))
          .catch(err => console.log('[SW] Registration failed', err));
      });
    }
  </script>
</body>
</html>
