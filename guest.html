<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Society POS — Guest Catalog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Society POS">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/guest.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="animated-bg"></div>

  <div class="guest-page">
    <!-- ═══ GUEST HEADER ═══ -->
    <header class="guest-header">
      <div class="guest-brand">
        <div class="guest-brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
        </div>
        <h2>Society POS</h2>
        <span class="guest-badge">Guest</span>
      </div>

      <div class="guest-header-actions">
        <a href="index.html" id="guest-login-link" class="btn btn-primary btn-sm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Admin Login
        </a>
      </div>
    </header>

    <!-- ═══ GUEST BODY ═══ -->
    <main class="guest-body">
      <!-- Hero Section -->
      <div class="guest-hero">
        <h1>Browse Our Catalog</h1>
        <p>View available items and their current stock levels. Login for full POS functionality.</p>
      </div>

      <!-- Search Bar -->
      <div class="guest-search-wrapper">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="guest-search" placeholder="Search items by name...">
        </div>
      </div>

      <!-- Catalog Grid -->
      <div id="guest-catalog-grid">
        <!-- Product cards rendered by JS -->
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          <h4>Loading catalog…</h4>
          <p>Fetching available items from the inventory.</p>
        </div>
      </div>
    </main>

    <!-- ═══ GUEST FOOTER ═══ -->
    <footer class="guest-footer">
      <p>&copy; 2026 Society POS — Inventory &amp; Sales Management</p>
    </footer>
  </div>

  <!-- Toast Container -->
  <div class="toast-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  
  <!-- Guest Logic inline or separate if needed -->
  <script>
    // Minimal logic to fetch and display catalog for guest if not fully implemented
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('guest-catalog-grid');
      if(window.db) {
        window.db.collection('inventory').where('quantity', '>', 0).onSnapshot(snap => {
          if (snap.empty) {
            grid.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280;">No items available right now.</div>';
            return;
          }
          grid.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">' + snap.docs.map(doc => {
            const item = doc.data();
            return `
              <div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:1px solid #f3f4f6;">
                <div style="font-weight:600;font-size:16px;margin-bottom:8px;">${item.name || 'Unknown'}</div>
                <div style="font-size:13px;color:#6b7280;margin-bottom:12px;">${item.contributorName || 'Unassigned'}</div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span style="font-weight:700;color:#111827;">${Utils.formatCurrency(item.price)}</span>
                  <span style="font-size:12px;background:#f0fdf4;color:#166534;padding:4px 8px;border-radius:999px;font-weight:600;">${item.quantity} in stock</span>
                </div>
              </div>
            `;
          }).join('') + '</div>';
        });
      }
    });
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[SW] Registered'))
          .catch(err => console.log('[SW] Registration failed', err));
      });
    }
  </script>
</body>
</html>
